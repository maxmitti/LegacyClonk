name: Validate C4Script functions

on:
  push:
    branches: [ 'master' ]
  pull_request:
    branches: '*'
  workflow_dispatch:
    inputs:
      docs_repository:
        description: 'Which docs repository to validate against'
        required: true
        type: string
        default: maxmitti/lcdocs

defaults:
  run:
    shell: bash

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout legacyclonk repo
        uses: actions/checkout@v6

      - name: Checkout docs repo
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.docs_repository || 'maxmitti/lcdocs' }}
          path: lcdocs

      - name: "Ubuntu 18.04: Setup chroot"
        run: |
          curl -L https://github.com/legacyclonk/ubuntu-1804-x86-chroot/releases/download/2022-05-19/chroot.tar.xz | sudo tar -xJ
          curl -L https://raw.githubusercontent.com/legacyclonk/ubuntu-1804-x86-chroot/master/setup_chroot.sh | sudo bash -e -
          sudo mkdir -p chroot/$PWD
          sudo mount --bind . chroot/$PWD
          echo "CHROOT=$PWD/.github/workflows/Linux-x86-chroot.sh" >> $GITHUB_ENV

      - name: Setup saxonb-xslt, python, gettext, Mako (Python templating engine), typescript compiler, sass (scss compiler)
        run: |
          $CHROOT sudo DEBIAN_FRONTEND=noninteractive apt-get install --no-install-recommends libsaxonb-java python-libxml2 gettext openjdk-11-jre-headless python3-mako curl -y
          $CHROOT cd /usr/local \&\& \(curl -L https://unofficial-builds.nodejs.org/download/release/v21.7.3/node-v21.7.3-linux-x86.tar.xz \| tar --strip-components=1 -xJ\)
          echo "PATH=/usr/local/bin:$PATH" >> $GITHUB_ENV
          $CHROOT cd lcdocs/developer \&\& npm ci

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '25'
          cache: 'npm'
          cache-dependency-path: .github/workflows/C4ScriptDocAnalyzer/package-lock.json

      - name: Install dependencies
        run: |
          cd .github/workflows/C4ScriptDocAnalyzer && npm install

      - name: Build function list
        run: $CHROOT make -C lcdocs -j$(nproc)

      - name: Copy generated Functions.txt
        run: cp lcdocs/lcdocs_summary.json .github/workflows/C4ScriptDocAnalyzer/

      - name: Run analyze script
        id: analyze
        run: node .github/workflows/C4ScriptDocAnalyzer/index.js
        continue-on-error: false

